<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #121212;
      --bg-surface: rgba(255, 255, 255, 0.04);
      --bg-surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(255, 255, 255, 0.16);
      --text-primary: #f0f0f0;
      --text-secondary: #8a8a8a;
      --text-tertiary: #5a5a5a;
      --accent: #6366f1;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --success: #22c55e;
      --success-dim: rgba(34, 197, 94, 0.12);
      --warning: #eab308;
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.12);
      --radius: 4px;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-primary);
      background: var(--bg-base);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Status ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }

    .status-bar::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .status-bar.success { border-color: rgba(34, 197, 94, 0.2); color: var(--success); }
    .status-bar.success::before { background: var(--success); }
    .status-bar.error { border-color: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .status-bar.error::before { background: var(--danger); }
    .status-bar.warning { border-color: rgba(234, 179, 8, 0.2); color: var(--warning); }
    .status-bar.warning::before { background: var(--warning); }

    /* ── Progress ── */
    .progress-section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .progress-section.hidden { display: none; }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .progress-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      transition: color 0.35s ease, text-shadow 0.35s ease;
    }

    .progress-count.preview-active {
      color: #4ade80;
      text-shadow: 0 0 12px rgba(74, 222, 128, 0.24);
    }

    .progress-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .progress-total {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: right;
    }

    .progress-bar-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-bar-fill.indeterminate {
      width: 30%;
      animation: slide 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .progress-eta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 8px;
    }

    /* ── Empty / celebration state ── */
    .empty-state {
      text-align: center;
      padding: 20px 16px;
      background: var(--success-dim);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: var(--radius);
      margin-bottom: 16px;
      animation: fadeSlideIn 0.4s ease-out;
    }

    .empty-state.hidden { display: none; }

    .empty-icon {
      font-size: 28px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .empty-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 4px;
    }

    .empty-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── Button ── */
    button {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      background: var(--bg-surface);
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s;
    }

    button:hover:not(:disabled) {
      background: var(--bg-surface-hover);
      border-color: var(--border-focus);
    }

    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button.hidden { display: none; }

    #actionButton.state-nav {
      background: var(--accent-dim);
      border-color: rgba(99, 102, 241, 0.2);
      color: var(--accent);
    }
    #actionButton.state-nav:hover { background: rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.35); }

    #actionButton.state-start {
      background: var(--success-dim);
      border-color: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }
    #actionButton.state-start:hover { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.35); }

    #actionButton.state-stop {
      background: var(--danger-dim);
      border-color: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }
    #actionButton.state-stop:hover { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.35); }

    /* ── Advanced ── */
    .advanced-tools {
      margin-top: 10px;
      margin-bottom: 16px;
    }

    button.advanced-toggle {
      width: auto;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    button.advanced-toggle:hover:not(:disabled) {
      background: transparent;
      border-color: transparent;
      color: var(--text-primary);
    }

    button.advanced-toggle:active:not(:disabled) { transform: none; }

    .advanced-toggle::after {
      content: '\25BE';
      font-size: 10px;
      transition: transform 0.15s ease;
    }

    .advanced-toggle.expanded::after {
      transform: rotate(180deg);
    }

    .advanced-panel {
      margin-top: 10px;
      padding: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      animation: fadeSlideIn 0.2s ease-out;
    }

    .advanced-panel.hidden { display: none; }

    .advanced-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .advanced-value {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-weight: 700;
    }

    .advanced-slider {
      width: 100%;
      accent-color: var(--accent);
      margin-bottom: 8px;
    }

    .advanced-help {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.35;
    }

    .advanced-help:empty { display: none; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ── */
    .footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding-top: 12px;
      margin-top: 16px;
    }

    .footer a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 30px;
      padding: 6px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      font-size: 12px;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.3s, font-size 0.3s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .footer a:hover {
      color: var(--text-secondary);
      border-color: rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
    }

    .footer a.highlight {
      color: #4ade80;
      font-size: 13px;
      font-weight: 700;
      border-color: rgba(34, 197, 94, 0.2);
      background: rgba(34, 197, 94, 0.18);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.3), 0 0 24px rgba(34, 197, 94, 0.15);
      animation: reviewGlow 2s ease infinite;
    }

    .footer a.highlight:hover {
      color: #86efac;
      background: rgba(34, 197, 94, 0.25);
      box-shadow: 0 0 16px rgba(34, 197, 94, 0.45), 0 0 32px rgba(34, 197, 94, 0.2);
    }

    @keyframes reviewGlow {
      0%, 100% { box-shadow: 0 0 12px rgba(34, 197, 94, 0.3), 0 0 24px rgba(34, 197, 94, 0.15); }
      50% { box-shadow: 0 0 18px rgba(34, 197, 94, 0.5), 0 0 36px rgba(34, 197, 94, 0.25); }
    }

    @media (prefers-reduced-motion: reduce) {
      .footer a.highlight { animation: none; }
    }

    /* ── Bug Report ── */
    button.bug-btn {
      width: auto;
      padding: 4px;
      justify-self: end;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--danger);
      display: flex;
      align-items: center;
      transition: opacity 0.15s, color 0.15s, background 0.15s, border-color 0.15s;
    }
    button.bug-btn:hover:not(:disabled) {
      background: var(--danger-dim);
      border-color: rgba(239, 68, 68, 0.2);
    }
    button.bug-btn:active:not(:disabled) { transform: none; }
  </style>
</head>
<body>
  <div id="status" class="status-bar">Ready</div>

  <div id="progress" class="progress-section hidden">
    <div class="progress-row">
      <div>
        <span id="count" class="progress-count">0</span>
        <span id="progressLabel" class="progress-label"> to delete</span>
      </div>
      <div id="totalLabel" class="progress-total"></div>
    </div>
    <div class="progress-bar-track">
      <div id="progressBar" class="progress-bar-fill"></div>
    </div>
    <div id="eta" class="progress-eta"></div>
  </div>

  <div id="emptyState" class="empty-state hidden">
    <div class="empty-icon">&#10024;</div>
    <div class="empty-title">All clear!</div>
    <div class="empty-sub">Your Watch Later playlist is empty.</div>
  </div>

  <button id="actionButton" class="state-start">Start Cleaning</button>

  <div class="advanced-tools">
    <button id="advancedToggle" class="advanced-toggle" type="button" aria-expanded="false">Advanced</button>
    <div id="advancedPanel" class="advanced-panel hidden">
      <label for="progressThreshold" class="advanced-label">
        Delete all videos with &gt;= <span id="progressThresholdValue" class="advanced-value">0%</span> watch progress
      </label>
      <input id="progressThreshold" class="advanced-slider" type="range" min="0" max="100" step="1" value="0">
      <div id="advancedHelp" class="advanced-help"></div>
    </div>
  </div>

  <div class="footer">
    <a id="reviewLink" href="#">Leave a review</a>
    <button id="bugReport" class="bug-btn" title="Report a bug">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5.5 2.5C5.5 1.7 6.6 1 8 1s2.5.7 2.5 1.5"/>
        <rect x="4.5" y="5" width="7" height="8" rx="3.5" fill="var(--danger-dim)"/>
        <path d="M2 6.5h2.5M11.5 6.5H14M2 10.5h2.5M11.5 10.5H14"/>
        <path d="M3.5 3.5L5 5M12.5 3.5L11 5"/>
        <path d="M8 8v2.5M6 8.5h4"/>
      </svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
