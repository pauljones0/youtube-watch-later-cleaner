name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          manifest_version=$(grep '"version"' manifest.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          if [ "$manifest_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag v${{ steps.version.outputs.version }} does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Build .xpi
        run: |
          zip youtube-watch-later-cleaner.xpi \
            manifest.json content.js popup.html popup.js icon.svg removeWatchLater.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: youtube-watch-later-cleaner.xpi
          generate_release_notes: true
